{% extends "base.html" %}

{% block title %}Edit Student{% endblock %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_student.css') }}">
{% endblock %}

{% block page_title %}Edit Student{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Edit Student</h2>

    <form id="editStudentForm" method="POST">

        <label>Full Name</label>
        <input type="text" name="full_name" value="John Doe" required>

        <label>Phone</label>
        <input type="text" name="phone" value="0700000000">

        <label>Email</label>
        <input type="email" name="email" value="john@gmail.com">

        <label>Course</label>
        <input type="text" name="course" value="PC101">

        <button type="submit">Update Student</button>

        <a href="/students" class="back-link">
            ← Back to Students
        </a>

    </form>

</div>

{% endblock %}
